spring.application.name=Initial

# O Spring vai ler da Render. Se estiver no seu PC, usa o localhost:5433
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/polls}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:docker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:docker}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect